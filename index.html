<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1b4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meals">
  <title>Meal Planner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <span class="header-logo">🍽</span>
      <h1 class="header-title">Meal Planner</h1>
      <span class="header-budget" id="header-budget"></span>
    </div>
  </header>

  <main class="app-main">

    <!-- ── CALENDAR VIEW ── -->
    <section id="view-calendar" class="view active">
      <div class="week-nav">
        <button class="week-btn" id="prev-week" aria-label="Previous week">&#8249;</button>
        <div class="week-label-wrap">
          <span id="week-label" class="week-label"></span>
          <span id="week-num-label" class="week-cycle"></span>
        </div>
        <button class="week-btn" id="next-week" aria-label="Next week">&#8250;</button>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </section>

    <!-- ── SHOPPING VIEW ── -->
    <section id="view-shopping" class="view">
      <div class="shop-header">
        <div>
          <h2 class="shop-title" id="shop-week-label">Shopping List</h2>
          <p class="shop-sub" id="shop-week-sub"></p>
        </div>
        <div class="shop-cost-wrap">
          <span class="shop-cost-label">Est. total</span>
          <span class="shop-cost" id="shop-total"></span>
        </div>
      </div>
      <div class="shop-actions">
        <button class="btn-outline" id="clear-checks">Clear checks</button>
        <button class="btn-outline" id="copy-list">Copy list</button>
      </div>
      <div id="shopping-list" class="shopping-list"></div>
    </section>

    <!-- ── RECIPES VIEW ── -->
    <section id="view-recipes" class="view">
      <div class="recipe-mode-toggle">
        <button class="mode-btn active" data-mode="mine">My Recipes</button>
        <button class="mode-btn" data-mode="search">Search Online</button>
      </div>
      <div class="recipe-io-actions" id="recipe-io-actions">
        <button class="btn-outline" id="export-recipes">Export</button>
        <button class="btn-outline" id="import-recipes">Import</button>
        <input type="file" id="import-file-input" accept="application/json" hidden>
      </div>
      <div id="search-browse-bar" class="recipe-filters" hidden>
        <button class="filter-btn active" data-browse="name">🔎 Name</button>
        <button class="filter-btn" data-browse="cuisine">🌍 Cuisine</button>
        <button class="filter-btn" data-browse="category">🍽 Category</button>
        <button class="filter-btn" data-browse="ingredient">🥕 Ingredient</button>
        <button class="filter-btn" data-browse="random">🎲 Surprise Me</button>
      </div>
      <div class="recipe-search-wrap" id="recipe-search-wrap">
        <input type="search" id="recipe-search" class="recipe-search" placeholder="Search meals…" autocomplete="off">
      </div>
      <div id="search-browse-options" class="recipe-filters" hidden></div>
      <div class="recipe-filters" id="recipe-tag-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="breakfast">Breakfast</button>
        <button class="filter-btn" data-filter="lunch">Lunch</button>
        <button class="filter-btn" data-filter="dinner">Dinner</button>
        <button class="filter-btn" data-filter="batch">Batch</button>
        <button class="filter-btn" data-filter="spicy">🌶 Spicy</button>
        <button class="filter-btn" data-filter="simple">⚡ Simple</button>
        <button class="filter-btn" data-filter="red-meat">🥩 Red Meat</button>
      </div>
      <div id="recipe-list" class="recipe-list"></div>
    </section>

  </main>

  <!-- ── RECIPE MODAL ── -->
  <div id="recipe-modal" class="modal" aria-modal="true" role="dialog" hidden>
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <button class="modal-close" id="modal-close" aria-label="Close">&#10005;</button>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ── SWAP MODAL ── -->
  <div id="swap-modal" class="modal" aria-modal="true" role="dialog" hidden>
    <div class="modal-backdrop" id="swap-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <button class="modal-close" id="swap-modal-close" aria-label="Close">&#10005;</button>
      <div id="swap-modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn active" data-view="calendar">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      </svg>
      <span>Calendar</span>
    </button>
    <button class="nav-btn" data-view="shopping">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span>Shopping</span>
    </button>
    <button class="nav-btn" data-view="recipes">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      <span>Recipes</span>
    </button>
  </nav>

  <script src="js/meals.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
